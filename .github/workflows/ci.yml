name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.os }} with PG ${{ matrix.pg_version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14]
        pg_version: [14, 15, 16, 17]
        compiler: [gcc, clang]
        exclude:
          # macOS doesn't have gcc in CI, only clang
          - os: macos-14
            compiler: gcc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache apt packages (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-pg${{ matrix.pg_version }}-${{ matrix.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-pg${{ matrix.pg_version }}-${{ matrix.os }}-

      - name: Install PostgreSQL (Linux)
        if: runner.os == 'Linux'
        run: |
          # Add PostgreSQL APT repository
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update

          # Install PostgreSQL and dependencies
          sudo apt-get install -y \
            postgresql-${{ matrix.pg_version }} \
            postgresql-server-dev-${{ matrix.pg_version }} \
            check

      - name: Install valgrind (only for the leak-check job)
        if: matrix.os == 'ubuntu-24.04' && matrix.compiler == 'gcc' && matrix.pg_version == 17
        run: sudo apt-get install -y valgrind

      - name: Install PostgreSQL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install postgresql@${{ matrix.pg_version }} check
          # Link pg_config to PATH
          echo "$(brew --prefix postgresql@${{ matrix.pg_version }})/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          make clean
          make CC=${{ matrix.compiler }}

      - name: Run unit tests
        run: make test-unit

      - name: Memory leak check (Linux only)
        if: matrix.os == 'ubuntu-24.04' && matrix.compiler == 'gcc' && matrix.pg_version == 17
        run: |
          valgrind --leak-check=full --error-exitcode=1 \
            --show-leak-kinds=definite,indirect \
            ./tests/unit/test_runner

      - name: Code coverage (ubuntu-24.04 + PG 17 + gcc only)
        if: matrix.os == 'ubuntu-24.04' && matrix.pg_version == 17 && matrix.compiler == 'gcc'
        run: |
          make clean
          make test-coverage
          bash <(curl -s https://codecov.io/bash) || echo "Codecov upload failed"
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration:
    name: Integration tests (ubuntu-24.04 + PG 17)
    needs: [test]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-pg17-ubuntu-24.04-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-pg17-ubuntu-24.04-

      - name: Install PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-17 \
            postgresql-server-dev-17 \
            check

      - name: Build
        run: |
          make clean
          make CC=gcc

      - name: Create integration test fixtures
        run: python3 tests/fixtures/create_test_catalog.py /tmp/pg_aud_fixture

      - name: Run integration tests
        env:
          PG_BACKUP_AUDITOR_TEST_CATALOG: /tmp/pg_aud_fixture
          PG_BACKUP_AUDITOR_TEST_INSTANCE: testinstance
          PG_BACKUP_AUDITOR_TEST_BACKUP_ID: TB50D5
        run: cd tests/unit && make CC=gcc run
